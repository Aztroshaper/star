<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aztro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23FFFFFF' d='M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.21l8.2-1.192z'/></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-user-drag: none;
        }

        #fade-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .crt-monitor-overlay {
            position: fixed; width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 8000;
            animation: crt-flicker 0.15s infinite;
        }

        .crt-monitor-overlay::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%), 
                        linear-gradient(90deg, rgba(255, 234, 0, 0.03), rgba(255, 255, 255, 0.02), rgba(255, 234, 0, 0.03));
            background-size: 100% 4px, 6px 100%;
            z-index: 8001; pointer-events: none;
        }

        .crt-monitor-overlay::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.9) 100%);
            box-shadow: inset 0 0 120px rgba(0,0,0,0.95);
            z-index: 8002; pointer-events: none;
        }

        .glow-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,234,0,0.08) 0%, rgba(0,0,0,0) 60%);
            pointer-events: none; z-index: 7999; mix-blend-mode: screen;
        }

        #vhs-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.12; z-index: 2; pointer-events: none;
            mix-blend-mode: overlay;
        }

        .tracking-distortion {
            position: fixed; left: 0; width: 100%; height: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px) contrast(180%) hue-rotate(15deg);
            box-shadow: 0 -2px 10px rgba(255, 234, 0, 0.2), 0 2px 10px rgba(255, 234, 0, 0.2);
            z-index: 3; animation: tracking-roll 7s infinite linear;
            pointer-events: none;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: contrast(1.3) saturate(1.4) sepia(0.15) hue-rotate(-5deg) drop-shadow(0 0 15px rgba(255, 234, 0, 0.3));
        }

        #drag-instruction {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 234, 0, 0.75);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 8004;
            pointer-events: none;
            white-space: nowrap;
            animation: pulse-text 2s infinite;
            text-shadow: 0 0 10px rgba(255, 234, 0, 0.3);
        }

        #bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
            z-index: 8005;
            width: 90%;
            justify-content: center;
        }

        #nav-title {
            color: #ffffff;
            font-size: 16pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 8px;
            min-width: 250px;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }

        #contact-area {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row;
            gap: 25px;
            z-index: 8005;
            justify-content: center;
            align-items: flex-start;
        }

        .contact-arc-wrapper {
            transform: translateY(var(--ty)) rotate(var(--rot));
        }

        .contact-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        .contact-item span {
            position: absolute;
            top: 45px;
            font-size: 0.8rem;
            font-weight: bold;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #FFEA00;
            text-shadow: 0 0 15px rgba(255, 234, 0, 1), 0 0 30px rgba(255, 234, 0, 0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            white-space: nowrap;
        }

        .contact-item:hover {
            color: #FFEA00;
            text-shadow: 0 0 20px rgba(255, 234, 0, 1), 0 0 40px rgba(255, 234, 0, 1);
            transform: scale(1.25);
        }

        .contact-item:hover span {
            opacity: 1;
            transform: scale(1);
        }

        @media (max-width: 768px) {
            #bottom-nav { bottom: 20px; gap: 15px; }
            #nav-title { font-size: 16pt; min-width: 150px; letter-spacing: 4px; }
            
            #contact-area { top: 15px; gap: 8px; width: 100%; padding: 0 5px; justify-content: space-evenly; }
            .contact-item { font-size: 1.8rem; }
            .contact-item span { display: none; }
            .contact-arc-wrapper {
                transform: translateY(calc(var(--ty) * 0.4)) rotate(calc(var(--rot) * 0.6));
            }
            #drag-instruction { font-size: 0.75rem; bottom: 65px; }
        }

        @keyframes pulse-text { 
            0% { opacity: 0.3; } 
            50% { opacity: 1; } 
            100% { opacity: 0.3; } 
        }
        @keyframes crt-flicker { 0% { opacity: 0.96; } 50% { opacity: 1; } 100% { opacity: 0.98; } }
        @keyframes tracking-roll { 0% { top: -5%; } 6% { top: 105%; } 100% { top: 105%; } }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">

    <div id="fade-overlay"></div>
    <div class="glow-overlay"></div>
    <div class="crt-monitor-overlay"></div>
    <canvas id="vhs-grain"></canvas>
    <div class="tracking-distortion"></div>

    <div id="canvas-container"></div>

    <div id="drag-instruction">Desliza la órbita para ver el menú</div>

    <div id="bottom-nav">
        <div id="nav-title">EXPLORE</div>
    </div>

    <div id="contact-area">
        <div class="contact-arc-wrapper" style="--rot: -20deg; --ty: 35px;">
            <a href="https://instagram.com/aztroshaper" target="_blank" class="contact-item">
                <i class="fab fa-instagram"></i><span>Instagram</span>
            </a>
        </div>
        <div class="contact-arc-wrapper" style="--rot: -10deg; --ty: 15px;">
            <a href="https://instagram.com/direct/t/aztroshaper" target="_blank" class="contact-item">
                <i class="far fa-paper-plane"></i><span>Mensaje</span>
            </a>
        </div>
        <div class="contact-arc-wrapper" style="--rot: -3deg; --ty: 5px;">
            <a href="https://tiktok.com/@aztroshaper" target="_blank" class="contact-item">
                <i class="fab fa-tiktok"></i><span>TikTok</span>
            </a>
        </div>
        <div class="contact-arc-wrapper" style="--rot: 3deg; --ty: 5px;">
            <a href="https://www.pi.fyi/u/aztroshaper" target="_blank" class="contact-item">
                <i class="fas fa-star"></i><span>Pi.fyi</span>
            </a>
        </div>
        <div class="contact-arc-wrapper" style="--rot: 10deg; --ty: 15px;">
            <a href="https://www.youtube.com/@Aztroshaper" target="_blank" class="contact-item">
                <i class="fab fa-youtube"></i><span>YouTube</span>
            </a>
        </div>
        <div class="contact-arc-wrapper" style="--rot: 20deg; --ty: 35px;">
            <a href="https://www.artstation.com/aztroshaper" target="_blank" class="contact-item">
                <i class="fab fa-artstation"></i><span>ArtStation</span>
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x' || e.key === 'u' || e.key === 's' || e.key === 'p')) { e.preventDefault(); }
            if (e.key === 'F12') { e.preventDefault(); }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) { e.preventDefault(); }
        });

        const canvas = document.getElementById('vhs-grain');
        const ctx = canvas.getContext('2d');
        canvas.width = 320; canvas.height = 320;
        function renderNoise() {
            const imgData = ctx.createImageData(canvas.width, canvas.height);
            const buffer = new Uint32Array(imgData.data.buffer);
            for (let i = 0; i < buffer.length; i++) {
                const noise = (Math.random() * 255) | 0;
                buffer[i] = (255 << 24) | (noise << 16) | (noise << 8) | noise;
            }
            ctx.putImageData(imgData, 0, 0);
            requestAnimationFrame(renderNoise);
        }
        renderNoise();

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.035);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        function updateResponsiveCamera() {
            camera.position.z = window.innerWidth <= 768 ? 16 : 10;
        }
        updateResponsiveCamera();

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const starsGeo = new THREE.BufferGeometry();
        const starsMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.06, transparent: true, opacity: 0.8});
        const starsVerts = [];
        for(let i=0; i<2500; i++) {
            starsVerts.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVerts, 3));
        const starField = new THREE.Points(starsGeo, starsMat);
        scene.add(starField);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const yellowHighlight = new THREE.PointLight(0xFFEA00, 2.5, 30);
        yellowHighlight.position.set(-5, -5, 5);
        scene.add(yellowHighlight);

        const orbitLight = new THREE.PointLight(0xffffff, 1, 20);
        scene.add(orbitLight);

        const logoLight = new THREE.PointLight(0xFFEA00, 4.0, 25);
        logoLight.position.set(0, 0, 0);
        scene.add(logoLight);

        const logoGroup = new THREE.Group();
        scene.add(logoGroup);

        const textureLoader = new THREE.TextureLoader();
        textureLoader.load('az.svg', function(texture) {
            texture.colorSpace = THREE.SRGBColorSpace;
            
            const layersCount = 20;
            const separation = 0.06;
            
            for (let i = 1; i <= layersCount; i++) {
                const darkness = 1 - (i / layersCount) * 0.75;
                const colorVal = Math.floor(255 * darkness);
                const hexColor = (colorVal << 16) | (colorVal << 8) | colorVal;
                
                const layerMat = new THREE.MeshBasicMaterial({ 
                    map: texture, 
                    transparent: true, 
                    side: THREE.DoubleSide, 
                    color: hexColor,
                    alphaTest: 0.5 
                });
                const layerGeo = new THREE.PlaneGeometry(4, 4);
                const layerMesh = new THREE.Mesh(layerGeo, layerMat);
                layerMesh.position.z = -i * separation;
                logoGroup.add(layerMesh);
            }

            const frontMat = new THREE.MeshBasicMaterial({ 
                map: texture, 
                transparent: true, 
                side: THREE.DoubleSide, 
                color: 0xffffff,
                alphaTest: 0.5
            });
            const frontMesh = new THREE.Mesh(new THREE.PlaneGeometry(4, 4), frontMat);
            frontMesh.position.z = 0;
            logoGroup.add(frontMesh);
        });

        const orbitGroup = new THREE.Group();
        scene.add(orbitGroup);
        const interactiveObjects = [];

        const starShape = new THREE.Shape();
        for (let i = 0; i < 10; i++) {
            const r = i % 2 === 0 ? 1.2 : 0.5;
            const a = (i / 10) * Math.PI * 2;
            if(i === 0) starShape.moveTo(Math.cos(a)*r, Math.sin(a)*r);
            else starShape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        
        const basicStarGeo = new THREE.ExtrudeGeometry(starShape, {depth: 0.05, bevelEnabled: true, bevelSize: 0.02, bevelThickness: 0.02});
        const basicWhiteMat = new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.8});

        const starGeo = new THREE.ExtrudeGeometry(starShape, { depth: 0.35, bevelEnabled: true, bevelSize: 0.08, bevelThickness: 0.08 });
        const starMat = new THREE.MeshStandardMaterial({ color: 0xFFEA00, roughness: 0.15, metalness: 0.9, emissive: 0x332200 });
        const starMesh = new THREE.Mesh(starGeo, starMat);
        
        const whiteStarMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5, roughness: 0.1 });
        const whiteStarGeo = new THREE.ExtrudeGeometry(starShape, { depth: 0.05, bevelEnabled: true, bevelSize: 0.02, bevelThickness: 0.02 });
        
        const frontWhiteStar = new THREE.Mesh(whiteStarGeo, whiteStarMat);
        frontWhiteStar.scale.set(0.4, 0.4, 0.4);
        frontWhiteStar.position.z = 0.22;
        starMesh.add(frontWhiteStar);
        
        const backWhiteStar = frontWhiteStar.clone();
        backWhiteStar.position.z = -0.22;
        backWhiteStar.rotation.y = Math.PI;
        starMesh.add(backWhiteStar);
        
        const wsLight1 = new THREE.PointLight(0xffffff, 1.5, 4);
        wsLight1.position.z = 0.6;
        starMesh.add(wsLight1);
        const wsLight2 = new THREE.PointLight(0xffffff, 1.5, 4);
        wsLight2.position.z = -0.6;
        starMesh.add(wsLight2);

        starMesh.scale.set(0.8, 0.8, 0.8);

        const pencilGroup = new THREE.Group();
        const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xFFEA00, clearcoat: 1.0, clearcoatRoughness: 0.1, roughness: 0.4 });
        const woodBody = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2, 6), bodyMat);
        
        const blackStarMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const blackStarGeo = new THREE.ExtrudeGeometry(starShape, { depth: 0.02, bevelEnabled: false });
        for(let i=0; i<4; i++) {
            const bStar = new THREE.Mesh(blackStarGeo, blackStarMat);
            bStar.scale.set(0.08, 0.08, 0.08);
            bStar.position.y = 0.6 - (i * 0.4);
            const angle = i * Math.PI * 0.65;
            bStar.position.x = Math.cos(angle) * 0.21;
            bStar.position.z = Math.sin(angle) * 0.21;
            bStar.rotation.y = -angle + Math.PI/2;
            bStar.rotation.z = Math.random();
            woodBody.add(bStar);
        }

        const woodMat = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.8 });
        const tipCone = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.5, 6), woodMat);
        tipCone.position.y = 1.25;
        const lead = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.2, 6), new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.5, metalness: 0.3}));
        lead.position.y = 1.4;
        
        const ferruleGroup = new THREE.Group();
        const fMat = new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 1.0, roughness: 0.2});
        for(let i=0; i<4; i++){
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.03, 8, 24), fMat);
            ring.position.y = -1.05 - (i*0.1);
            ring.rotation.x = Math.PI/2;
            ferruleGroup.add(ring);
        }
        
        const eraser = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.4, 16), new THREE.MeshStandardMaterial({color: 0xffaaaa, roughness: 0.9}));
        eraser.position.y = -1.5;
        pencilGroup.add(woodBody, tipCone, lead, ferruleGroup, eraser);
        pencilGroup.scale.set(0.8, 0.8, 0.8);

        const rubikGroup = new THREE.Group();
        const gap = 0.45;
        const cubeColors = [0xff0000, 0xffa500, 0xffffff, 0xFFEA00, 0x00ff00, 0x0000ff]; 
        
        const blackCoreMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 });
        const faceMaterials = cubeColors.map(c => new THREE.MeshPhysicalMaterial({ 
            color: c, roughness: 0.05, metalness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.1
        }));

        for(let x=-1; x<=1; x++){
            for(let y=-1; y<=1; y++){
                for(let z=-1; z<=1; z++){
                    const block = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), blackCoreMat);
                    block.position.set(x*gap, y*gap, z*gap);
                    
                    const planeGeo = new THREE.PlaneGeometry(0.36, 0.36);
                    if(x === 1) { const p = new THREE.Mesh(planeGeo, faceMaterials[0]); p.position.x = 0.201; p.rotation.y = Math.PI/2; block.add(p); }
                    if(x === -1){ const p = new THREE.Mesh(planeGeo, faceMaterials[1]); p.position.x = -0.201; p.rotation.y = -Math.PI/2; block.add(p); }
                    if(y === 1) { const p = new THREE.Mesh(planeGeo, faceMaterials[2]); p.position.y = 0.201; p.rotation.x = -Math.PI/2; block.add(p); }
                    if(y === -1){ const p = new THREE.Mesh(planeGeo, faceMaterials[3]); p.position.y = -0.201; p.rotation.x = Math.PI/2; block.add(p); }
                    if(z === 1) { const p = new THREE.Mesh(planeGeo, faceMaterials[4]); p.position.z = 0.201; block.add(p); }
                    if(z === -1){ const p = new THREE.Mesh(planeGeo, faceMaterials[5]); p.position.z = -0.201; p.rotation.y = Math.PI; block.add(p); }
                    
                    rubikGroup.add(block);
                }
            }
        }
        rubikGroup.scale.set(0.8, 0.8, 0.8);

        const clapGroup = new THREE.Group();
        const blackClapMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, roughness: 0.4, clearcoat: 0.5 });
        const whiteClapMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.2, clearcoat: 0.8 });
        
        const board = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.8, 0.1), blackClapMat);
        board.position.y = -0.9;
        
        const smallStarGeo = new THREE.ExtrudeGeometry(starShape, { depth: 0.1, bevelEnabled: true, bevelSize: 0.02, bevelThickness: 0.02 });
        const smallStarMat = new THREE.MeshStandardMaterial({ color: 0xFFEA00, roughness: 0.2, metalness: 0.8, emissive: 0x443300 });
        const clapperStar1 = new THREE.Mesh(smallStarGeo, smallStarMat);
        clapperStar1.scale.set(0.3, 0.3, 0.3);
        clapperStar1.position.set(0, 0, 0.06); 
        board.add(clapperStar1);
        
        const clapperStar2 = clapperStar1.clone();
        clapperStar2.position.set(0, 0, -0.06);
        clapperStar2.rotation.y = Math.PI;
        board.add(clapperStar2);
        
        const bottomStick = new THREE.Group();
        const bsBase = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 0.15), blackClapMat);
        for(let i=0; i<5; i++){
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.31, 0.16), whiteClapMat);
            stripe.position.set(-1 + i*0.5, 0, 0);
            stripe.rotation.z = -0.3;
            bottomStick.add(stripe);
        }
        bottomStick.add(bsBase);
        bottomStick.position.y = 0.15;
        
        const hingeGroup = new THREE.Group();
        hingeGroup.position.set(-1.25, 0.3, 0);
        const topStick = new THREE.Group();
        const tsBase = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 0.15), blackClapMat);
        tsBase.position.x = 1.25;
        for(let i=0; i<5; i++){
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.31, 0.16), whiteClapMat);
            stripe.position.set(0.25 + i*0.5, 0, 0);
            stripe.rotation.z = -0.3;
            topStick.add(stripe);
        }
        topStick.add(tsBase);
        hingeGroup.add(topStick);
        hingeGroup.rotation.z = 0.4; 
        
        const hingePin = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.2, 16), new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 1.0}));
        hingePin.rotation.x = Math.PI/2;
        hingeGroup.add(hingePin);

        clapGroup.add(board, bottomStick, hingeGroup);
        clapGroup.scale.set(0.6, 0.6, 0.6);

        const objectsData = [
            { mesh: starMesh, name: "ABOUT ME", url: "pag.html" },
            { mesh: pencilGroup, name: "ILLUSTRATIONS", url: "pag.html" },
            { mesh: rubikGroup, name: "3D MODELS", url: "pag.html" },
            { mesh: clapGroup, name: "ANIMATION", url: "pag.html" }
        ];

        objectsData.forEach((obj, index) => {
            orbitGroup.add(obj.mesh);
            obj.mesh.userData = { ...obj };
            
            if(obj.mesh.type === "Group") {
                obj.mesh.traverse(child => {
                    if(child.isMesh) {
                        child.userData = obj.mesh.userData;
                        child.userData.parentGroup = obj.mesh;
                        interactiveObjects.push(child);
                    }
                });
            } else {
                interactiveObjects.push(obj.mesh);
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const navTitle = document.getElementById('nav-title');
        let hoveredObject = null;
        let isTransitioning = false;
        
        let manualRotationOffset = 0;
        let isDraggingOrbit = false;
        let previousMouseX = 0;
        let dragVelocity = 0;
        let hasDragged = false;

        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('#contact-area') || e.target.closest('#bottom-nav') || isTransitioning) return;
            isDraggingOrbit = true;
            hasDragged = false;
            previousMouseX = e.clientX;
        });

        window.addEventListener('mousemove', (e) => {
            if(isTransitioning) return;

            if(isDraggingOrbit) {
                const deltaX = e.clientX - previousMouseX;
                if(Math.abs(deltaX) > 2) hasDragged = true;
                dragVelocity = deltaX * 0.003;
                manualRotationOffset += dragVelocity;
                previousMouseX = e.clientX;
            }

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects, false);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                let mainMesh = obj.userData.parentGroup || obj;

                if (hoveredObject !== mainMesh) {
                    if (hoveredObject) gsap.to(hoveredObject.scale, { x: hoveredObject.userData.initialScaleX, y: hoveredObject.userData.initialScaleY, z: hoveredObject.userData.initialScaleZ, duration: 0.3 });
                    
                    hoveredObject = mainMesh;
                    
                    if(!hoveredObject.userData.initialScaleX) {
                        hoveredObject.userData.initialScaleX = hoveredObject.scale.x;
                        hoveredObject.userData.initialScaleY = hoveredObject.scale.y;
                        hoveredObject.userData.initialScaleZ = hoveredObject.scale.z;
                    }

                    gsap.to(hoveredObject.scale, { 
                        x: hoveredObject.userData.initialScaleX * 1.4, 
                        y: hoveredObject.userData.initialScaleY * 1.4, 
                        z: hoveredObject.userData.initialScaleZ * 1.4, 
                        duration: 0.4, ease: "elastic.out(1, 0.5)" 
                    });
                    
                    navTitle.innerText = hoveredObject.userData.name;
                    navTitle.style.color = "#FFEA00";
                    navTitle.style.textShadow = "0 0 25px rgba(255, 234, 0, 1)";
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (hoveredObject) {
                    gsap.to(hoveredObject.scale, { x: hoveredObject.userData.initialScaleX, y: hoveredObject.userData.initialScaleY, z: hoveredObject.userData.initialScaleZ, duration: 0.3 });
                    hoveredObject = null;
                    navTitle.innerText = "EXPLORE";
                    navTitle.style.color = "#ffffff";
                    navTitle.style.textShadow = "0 0 15px rgba(255, 255, 255, 0.6)";
                }
                if(isDraggingOrbit) {
                    document.body.style.cursor = 'grabbing';
                } else {
                    document.body.style.cursor = 'default';
                }
            }
        });

        window.addEventListener('mouseup', () => {
            isDraggingOrbit = false;
        });

        window.addEventListener('mouseleave', () => {
            isDraggingOrbit = false;
        });

        window.addEventListener('touchstart', (e) => {
            if(e.target.closest('#contact-area') || e.target.closest('#bottom-nav') || isTransitioning) return;
            isDraggingOrbit = true;
            hasDragged = false;
            previousMouseX = e.touches[0].clientX;
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if(isTransitioning) return;
            if(isDraggingOrbit) {
                e.preventDefault(); 
                const deltaX = e.touches[0].clientX - previousMouseX;
                if(Math.abs(deltaX) > 2) hasDragged = true;
                dragVelocity = deltaX * 0.006; 
                manualRotationOffset += dragVelocity;
                previousMouseX = e.touches[0].clientX;
            }
        }, {passive: false});

        window.addEventListener('touchend', () => {
            isDraggingOrbit = false;
        });

        window.addEventListener('click', (e) => {
            if (hoveredObject && !isTransitioning && !hasDragged && !e.target.closest('#contact-area') && !e.target.closest('#bottom-nav')) {
                isTransitioning = true;
                const targetData = hoveredObject.userData;
                const overlay = document.getElementById('fade-overlay');
                
                const targetPos = new THREE.Vector3();
                hoveredObject.getWorldPosition(targetPos);
                
                const popStarsCount = 10;
                for(let i=0; i<popStarsCount; i++) {
                    const ps = new THREE.Mesh(basicStarGeo, basicWhiteMat);
                    ps.scale.set(0.06, 0.06, 0.06);
                    ps.position.copy(targetPos);
                    scene.add(ps);
                    
                    const randomAngle = Math.random() * Math.PI * 2;
                    const randomY = (Math.random() - 0.5) * 2;
                    const radius = 1.2 + Math.random();
                    
                    gsap.to(ps.position, {
                        x: targetPos.x + Math.cos(randomAngle) * radius,
                        y: targetPos.y + randomY * radius,
                        z: targetPos.z + Math.sin(randomAngle) * radius,
                        duration: 0.6 + Math.random()*0.3,
                        ease: "power2.out"
                    });
                    gsap.to(ps.rotation, {
                        x: Math.random() * Math.PI * 4,
                        y: Math.random() * Math.PI * 4,
                        duration: 0.8
                    });
                    gsap.to(ps.scale, {
                        x: 0, y: 0, z: 0,
                        duration: 0.3, delay: 0.3 + Math.random()*0.2, ease: "back.in(2)",
                        onComplete: () => scene.remove(ps)
                    });
                }
                
                const zoomDist = 1.5; 
                gsap.to(camera.position, {
                    x: targetPos.x,
                    y: targetPos.y,
                    z: targetPos.z + zoomDist,
                    duration: 1.5,
                    ease: "power3.in"
                });

                setTimeout(() => {
                    overlay.style.backgroundColor = "#000000";
                    overlay.style.opacity = 1;
                    
                    setTimeout(() => {
                        window.location.href = targetData.url;
                    }, 1500);
                }, 800);
            }
        });

        const clock = new THREE.Clock();

        window.onload = () => {
            gsap.fromTo(".contact-item", 
                { scale: 0, opacity: 0 }, 
                { scale: 1, opacity: 1, duration: 0.8, stagger: 0.1, ease: "back.out(1.5)", delay: 0.5, clearProps: "transform,opacity" }
            );

            setTimeout(() => {
                document.getElementById('fade-overlay').style.opacity = 0;
                
                const introStars = [];
                for(let i=0; i<12; i++) {
                    const s = new THREE.Mesh(basicStarGeo, basicWhiteMat);
                    s.scale.set(0.12, 0.12, 0.12);
                    s.position.set((Math.random()-0.5)*4, (Math.random()-0.5)*4, (Math.random()-0.5)*4);
                    scene.add(s);
                    introStars.push(s);
                    
                    if (i > 1) {
                        gsap.to(s.position, {
                            x: s.position.x * 2.5, y: s.position.y * 2.5, z: s.position.z * 2.5,
                            duration: 1.5 + Math.random(), ease: "power2.out"
                        });
                        gsap.to(s.rotation, {
                            x: Math.random() * Math.PI * 2, y: Math.random() * Math.PI * 2,
                            duration: 2
                        });
                        gsap.to(s.scale, {
                            x: 0, y: 0, z: 0,
                            duration: 0.3, delay: 1.2 + Math.random(), ease: "back.in(2)",
                            onComplete: () => scene.remove(s)
                        });
                    }
                }
                
                const orbitStar1 = introStars[0];
                const orbitStar2 = introStars[1];
                let introTime = {t: 0};
                
                gsap.to(introTime, {
                    t: Math.PI * 4,
                    duration: 2.5,
                    ease: "power2.inOut",
                    onUpdate: () => {
                        orbitStar1.position.x = Math.cos(introTime.t) * 2.5;
                        orbitStar1.position.z = Math.sin(introTime.t) * 2.5;
                        orbitStar1.position.y = Math.sin(introTime.t * 2) * 1.5;
                        orbitStar1.rotation.y += 0.1;
                        orbitStar1.rotation.x += 0.1;
                        
                        orbitStar2.position.x = Math.cos(introTime.t + Math.PI) * 2.5;
                        orbitStar2.position.z = Math.sin(introTime.t + Math.PI) * 2.5;
                        orbitStar2.position.y = Math.sin((introTime.t + Math.PI) * 2) * 1.5;
                        orbitStar2.rotation.y -= 0.1;
                        orbitStar2.rotation.x -= 0.1;
                    },
                    onComplete: () => {
                        gsap.to([orbitStar1.scale, orbitStar2.scale], {
                            x: 0, y: 0, z: 0, duration: 0.4, ease: "back.in(2)",
                            onComplete: () => { scene.remove(orbitStar1); scene.remove(orbitStar2); }
                        });
                    }
                });
                
            }, 500);
        };

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            dragVelocity *= 0.95;
            manualRotationOffset += dragVelocity;

            orbitLight.position.x = Math.sin(time) * 6;
            orbitLight.position.z = Math.cos(time) * 6;
            orbitLight.position.y = Math.sin(time * 0.5) * 3;

            if(!isTransitioning){
                orbitGroup.rotation.y = (time * 0.3) + manualRotationOffset;
                
                logoGroup.rotation.x = -0.3 + Math.sin(time * 0.5) * 0.05;
                logoGroup.position.y = Math.sin(time * 2) * 0.15;
                
                objectsData.forEach((obj, i) => {
                    const radius = window.innerWidth < 768 ? 4.8 : 5.5;
                    const angle = (i / objectsData.length) * Math.PI * 2;
                    obj.mesh.position.x = Math.cos(angle) * radius;
                    obj.mesh.position.z = Math.sin(angle) * radius;
                    obj.mesh.position.y = Math.sin(time * 1.5 + i) * 0.6;
                    
                    obj.mesh.rotation.x += 0.01;
                    obj.mesh.rotation.y += 0.015;
                });
            }

            starField.rotation.y = time * 0.02;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateResponsiveCamera();
        });
    </script>
</body>
</html>
